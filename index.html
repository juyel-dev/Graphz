<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphz - Explore Mathematical Graphs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <div class="container">
            <div class="nav-brand">
                <div class="logo">📊</div>
                <h1 class="site-title">Graphz</h1>
            </div>
            
            <!-- Hamburger Menu -->
            <div class="hamburger-menu" id="hamburgerMenu">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- Search Bar -->
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search graphs... (try 'ohms law')">
                    <button class="search-btn">🔍</button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <nav class="mobile-nav" id="mobileNav">
            <a href="#home">Home</a>
            <a href="#gallery">Graph Gallery</a>
            <a href="#admin" class="admin-link">Admin Panel</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Hero Section -->
        <section id="home" class="hero-section">
            <div class="container">
                <h2 class="hero-title">Explore Beautiful Mathematical Graphs</h2>
                <p class="hero-subtitle">Physics, Mathematics, Chemistry and more - visualized beautifully</p>
                
                <!-- Featured Graphs Grid -->
                <div class="featured-grid" id="featuredGraphs">
                    <!-- Graphs will be loaded here -->
                </div>
            </div>
        </section>

        <!-- Graph Gallery -->
        <section id="gallery" class="gallery-section">
            <div class="container">
                <h3>Graph Gallery</h3>
                <div class="gallery-grid" id="graphGallery">
                    <!-- All graphs will be loaded here -->
                </div>
            </div>
        </section>

        <!-- Admin Panel (Hidden by default) -->
        <section id="admin" class="admin-section" style="display: none;">
            <div class="container">
                <div class="admin-login" id="adminLogin">
                    <h3>Admin Login</h3>
                    <input type="password" id="adminPassword" placeholder="Enter admin password">
                    <button onclick="loginAdmin()">Login</button>
                </div>
                
                <div class="admin-panel" id="adminPanel" style="display: none;">
                    <h3>Admin Panel</h3>
                    <!-- Admin controls will be here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>Graphz</h4>
                    <p>Exploring mathematics through beautiful visualizations</p>
                </div>
                <div class="footer-section">
                    <h4>Connect</h4>
                    <div class="social-links" id="socialLinks">
                        <!-- Social links will be loaded here -->
                    </div>
                </div>
                <div class="footer-section">
                    <h4>Contact</h4>
                    <p id="contactInfo">contact@graphz.com</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
